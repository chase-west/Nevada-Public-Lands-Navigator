name: Prevent Supabase Pause

on:
  schedule:
    # Run twice a week (Monday and Thursday at midnight UTC)
    - cron: '0 0 * * 1,4'
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase to prevent pause
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "Error: SUPABASE_URL or SUPABASE_ANON_KEY secret is not defined."
            echo "Please add these in: Settings > Secrets and variables > Actions > New repository secret"
            exit 1
          fi

          echo "Pinging Supabase REST API to keep project active..."

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${SUPABASE_URL}/rest/v1/" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}")

          echo "HTTP response: $HTTP_STATUS"

          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 400 ]; then
            echo "Ping successful! Supabase project will stay active."
          else
            echo "Error: Unexpected HTTP status $HTTP_STATUS from Supabase."
            exit 1
          fi
