name: Prevent Supabase Pause

on:
  schedule:
    # Run twice a week (e.g., Monday and Thursday at midnight UTC)
    - cron: '0 0 * * 1,4'
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Database
        env:
          # Add this secret in your GitHub repository settings:
          # Settings > Secrets and variables > Actions > New repository secret
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "Error: SUPABASE_DB_URL secret is not defined."
            echo "Please define SUPABASE_DB_URL in your GitHub repository secrets."
            exit 1
          fi

          echo "Pinging Database to keep it active..."
          
          # Using PostgreSQL client (psql is pre-installed on ubuntu-latest runners) 
          # to execute a simple, low-cost query
          psql "$SUPABASE_DB_URL" -c "SELECT 1 as ping;"

          echo "Ping successful! Supabase DB will stay active."
